<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Magnolia Manor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-background">
    <header>
        <div class="logo-container">
            <img src="images/logo.jpeg" alt="Magnolia Manor Logo" class="logo">
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="venue.html">Venues</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="events.html">Events</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="contact inner-page">
        <h2>Plan Your Next Event</h2>
        <form action="#" method="POST">
            <div class="input-group">
                <input type="text" placeholder="Full Name" required>
                <input type="email" placeholder="Email Address" required>
            </div>
            <textarea placeholder="Tell us about your event..." rows="5" required></textarea>
            <button type="submit" class="btn">Submit Inquiry</button>
        </form>
    </section>

    <footer>
        <div class="footer-content">
            <div class="footer-logo">
                <img src="images/logo.jpeg" alt="Magnolia Manor Logo" class="logo">
            </div>
            <div class="footer-contact">
                <p><strong>Contact Us</strong></p>
                <p>Oak Ridge, NC</p>
                <p>(555) 123-4567</p>
                <p>info@magnoliamanor.com</p>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 Magnolia Manor Business & Event Center. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
